name: Scheduled exchange rate scrape

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes (runs at :00 and :30 of every hour)
    # Note: GitHub Actions may take up to 1 hour to recognize schedule changes
    - cron: "0,30 * * * *"

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scraper and save to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python main.py --save

