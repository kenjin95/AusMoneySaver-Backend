name: Scheduled exchange rate scrape

on:
  workflow_dispatch:
  schedule:
    # Poll every 10 minutes, but run scrape only when data is stale.
    # This mitigates missed/delayed GitHub schedule ticks.
    - cron: "*/10 * * * *"

concurrency:
  group: scheduled-exchange-rate-scrape
  cancel-in-progress: false

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lightweight deps for freshness gate
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Decide whether scrape is needed
        id: gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          python scripts/check_data_freshness.py --threshold-minutes 25
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "should_scrape=false" >> "$GITHUB_OUTPUT"
            echo "Data is fresh. Skipping scrape."
          else
            echo "should_scrape=true" >> "$GITHUB_OUTPUT"
            echo "Data is stale or freshness check failed. Running scrape."
          fi

      - name: Install scraper dependencies
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_scrape == 'true'
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scraper and save to Supabase
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_scrape == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPE_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          MIN_SUCCESS_PROVIDERS: "5"
        run: |
          python main.py --save --min-success-providers 5 --allow-partial-success

      - name: Send triggered rate alerts
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          ALERT_COOLDOWN_HOURS: "24"
          AFFILIATE_LINK_ANZ: ${{ secrets.AFFILIATE_LINK_ANZ }}
          AFFILIATE_LINK_COMMBANK: ${{ secrets.AFFILIATE_LINK_COMMBANK }}
          AFFILIATE_LINK_NAB: ${{ secrets.AFFILIATE_LINK_NAB }}
          AFFILIATE_LINK_WESTPAC: ${{ secrets.AFFILIATE_LINK_WESTPAC }}
          AFFILIATE_LINK_WISE: ${{ secrets.AFFILIATE_LINK_WISE }}
          AFFILIATE_LINK_REMITLY: ${{ secrets.AFFILIATE_LINK_REMITLY }}
          AFFILIATE_LINK_OFX: ${{ secrets.AFFILIATE_LINK_OFX }}
          AFFILIATE_LINK_UNITEDCURRENCY: ${{ secrets.AFFILIATE_LINK_UNITEDCURRENCY }}
          AFFILIATE_LINK_TRAVELMONEYOZ: ${{ secrets.AFFILIATE_LINK_TRAVELMONEYOZ }}
          AFFILIATE_LINK_TRAVELEX: ${{ secrets.AFFILIATE_LINK_TRAVELEX }}
        run: |
          python scripts/send_rate_alerts.py
