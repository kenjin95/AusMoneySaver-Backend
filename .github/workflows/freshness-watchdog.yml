name: Freshness watchdog

on:
  workflow_dispatch:
  schedule:
    # Offset from scheduled scrape cron to reduce overlap race conditions.
    - cron: "27,57 * * * *"

concurrency:
  group: freshness-watchdog
  cancel-in-progress: false

jobs:
  freshness-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Check data freshness
        id: freshness_initial
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/check_data_freshness.py \
            --threshold-minutes 120 \
            --retry-attempts 3 \
            --retry-delay-seconds 120

      - name: Install scraper dependencies (recovery)
        if: steps.freshness_initial.outcome == 'failure'
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run recovery scrape
        if: steps.freshness_initial.outcome == 'failure'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_RUN_ID: watchdog-${{ github.run_id }}-${{ github.run_attempt }}
          MIN_SUCCESS_PROVIDERS: "5"
        run: |
          python main.py --save --min-success-providers 5 --allow-partial-success

      - name: Re-check data freshness after recovery
        if: steps.freshness_initial.outcome == 'failure'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/check_data_freshness.py \
            --threshold-minutes 120 \
            --retry-attempts 2 \
            --retry-delay-seconds 90
